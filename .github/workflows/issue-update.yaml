name: Add Update on Issue Close

on:
  issues:
    types: [closed]

jobs:
  add_update:
    # Only run if it has our label and was closed as 'completed' (not 'not planned')
    if: contains(github.event.issue.labels.*.name, 'content-update') && github.event.issue.state_reason == 'completed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Process Issue into JSON Database
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;

            // Function to extract data from GitHub Issue Form body
            const extractData = (marker) => {
              const regex = new RegExp(`### ${marker}\\n+([^#]+)`, 'i');
              const match = issue.body.match(regex);
              let val = match ? match[1].trim() : '';
              if (val === '_No response_') val = '';
              return val;
            };

            const title = extractData('Update Title') || issue.title.replace('[Update]', '').trim();
            const content = extractData('Full Content');
            const image = extractData('Image URL \\(Optional\\)');

            // Read existing updates
            let updates = [];
            if (fs.existsSync('updates.json')) {
              updates = JSON.parse(fs.readFileSync('updates.json', 'utf8'));
            }

            // Add new update using the GitHub Issue ID
            updates.unshift({
              id: issue.number.toString(),
              title: title,
              date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
              content: content,
              image: image,
              url: '#'
            });

            fs.writeFileSync('updates.json', JSON.stringify(updates, null, 2));
            console.log(`Successfully added Update #${issue.number}`);

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add updates.json
          git commit -m "Publish update from closed Issue #${{ github.event.issue.number }}"
          git push
